<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Mixer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #1c1c1e;
  --panel:     #2c2c2e;
  --text:      #f5f5f7;
  --subtle:    #8e8e93;
  --accent:    #0a84ff;
  --success:   #30d158;
  --error:     #ff453a;
  --border:    #3a3a3c;
  --portrait:  #3d2b6e;
  --landscape: #1a3a6e;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  font-size: 14px;
  line-height: 1.5;
}

.container {
  max-width: 980px;
  margin: 0 auto;
  padding: 24px 20px 40px;
}

/* ── Header ── */
.header { margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.header p { color: var(--subtle); font-size: 13px; margin-top: 3px; }

/* ── Accordion sections ── */
details { border-bottom: 1px solid var(--border); }
details summary {
  padding: 11px 0;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--subtle);
  cursor: pointer;
  user-select: none;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 7px;
}
details summary::-webkit-details-marker { display: none; }
details summary::before {
  content: '▶';
  font-size: 9px;
  transition: transform 0.15s;
  display: inline-block;
  width: 10px;
}
details[open] summary::before { transform: rotate(90deg); }
.section-body { padding: 4px 0 16px 17px; }

/* ── Form rows ── */
.form-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 9px;
  flex-wrap: wrap;
}
.form-row label { font-size: 13px; }
.form-row label.fixed { width: 160px; flex-shrink: 0; }
input[type="text"], input[type="number"], select {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 5px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
input[type="text"]:focus, input[type="number"]:focus, select:focus {
  border-color: var(--accent);
}
input[type="text"].path { flex: 1; min-width: 200px; }
input[type="number"].short { width: 76px; }
.unit { color: var(--subtle); font-size: 12px; white-space: nowrap; }
input[type="checkbox"] {
  width: 15px; height: 15px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}

/* ── Buttons ── */
.btn {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 6px 14px;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.1s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) { background: var(--border); }
.btn:disabled { opacity: 0.38; cursor: not-allowed; }
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.btn.primary:hover:not(:disabled) { background: #0071e3; border-color: #0071e3; }
.btn.muted { background: #48484a; border-color: #48484a; color: #fff; }
.btn.muted:hover:not(:disabled) { background: #636366; border-color: #636366; }
.btn.sm { padding: 4px 10px; font-size: 12px; }
.btn.danger { color: var(--error); border-color: var(--border); }

/* ── Action bar ── */
.action-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin-top: 6px;
  flex-wrap: wrap;
}
.btn-group { display: flex; gap: 8px; align-items: center; }
.progress-area { flex: 1; min-width: 180px; }
.progress-wrap { display: flex; align-items: center; gap: 10px; }
progress {
  flex: 1; height: 5px;
  border-radius: 3px; border: none;
  background: var(--panel);
  appearance: none; -webkit-appearance: none;
}
progress::-webkit-progress-bar { background: var(--panel); border-radius: 3px; }
progress::-webkit-progress-value { background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.status-text { font-size: 12px; color: var(--subtle); min-width: 90px; text-align: right; }

/* ── Plan section header ── */
.plan-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 10px;
}
.plan-hdr h2 {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--subtle);
}

/* ── Timeline ── */
.timeline-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  min-height: 78px;
  overflow-x: auto;
  margin-bottom: 8px;
}
.timeline-empty {
  display: flex; align-items: center; justify-content: center;
  min-height: 56px;
  color: var(--subtle); font-size: 13px;
}
.timeline-clips { display: flex; gap: 4px; align-items: stretch; }
.clip-block {
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 5px 7px;
  border-radius: 5px;
  min-width: 56px; height: 56px;
  cursor: pointer;
  user-select: none;
  border: 2px solid transparent;
  transition: border-color 0.1s, opacity 0.1s;
  overflow: hidden;
  flex-shrink: 0;
}
.clip-block:hover { opacity: 0.82; }
.clip-block.selected { border-color: #fff; }
.clip-block.portrait  { background: var(--portrait); }
.clip-block.landscape { background: var(--landscape); }
.clip-block.dragging  { opacity: 0.3; }
.clip-block.drag-over { border-color: var(--accent); }
.clip-name { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.clip-dur  { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 2px; }

/* ── Clip editor ── */
.clip-editor {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  margin-bottom: 8px;
  display: none;
}
.clip-editor.open { display: block; }
.clip-editor-title {
  font-size: 13px; font-weight: 600;
  margin-bottom: 10px;
  word-break: break-all;
}
.clip-editor-fields { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.ce-field { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.ce-field label { color: var(--subtle); }
.ce-field input {
  width: 76px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text);
  padding: 4px 8px; font-size: 13px; font-family: inherit; outline: none;
}
.ce-field input:focus { border-color: var(--accent); }
.badge {
  display: inline-block;
  padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600;
}
.badge.portrait  { background: var(--portrait);  color: #c4a7ff; }
.badge.landscape { background: var(--landscape); color: #7eb8ff; }

/* ── JSON toggle / editor ── */
.json-toggle-row { padding: 4px 0 2px; }
.json-toggle {
  background: none; border: none;
  color: var(--subtle); font-size: 12px; font-family: inherit;
  cursor: pointer; padding: 2px 0;
  display: flex; align-items: center; gap: 5px;
}
.json-toggle:hover { color: var(--text); }
.json-editor-wrap { display: none; margin-top: 8px; }
.json-editor-wrap.open { display: block; }
.json-editor-wrap textarea {
  width: 100%; height: 180px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  padding: 10px 12px;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 11.5px; line-height: 1.5;
  resize: vertical; outline: none;
}
.json-editor-wrap textarea:focus { border-color: var(--accent); }

/* ── Log ── */
.log-section { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 14px; }
.log-hdr {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 8px;
}
.log-hdr h2 {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--subtle);
}
.log-output {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  height: 190px; overflow-y: auto;
  font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
  font-size: 11.5px; line-height: 1.6;
}
.log-line { white-space: pre-wrap; word-break: break-word; }
.log-line.accent  { color: var(--accent); }
.log-line.success { color: var(--success); }
.log-line.error   { color: var(--error); }
.log-line.subtle  { color: var(--subtle); }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <h1>🎬 Video Mixer</h1>
    <p>Combines landscape &amp; portrait clips into one landscape video.</p>
  </div>

  <!-- Source & Destination -->
  <details open>
    <summary>Source &amp; Destination</summary>
    <div class="section-body">
      <div class="form-row">
        <label class="fixed">Input folder</label>
        <input type="text" id="input" class="path" placeholder="/path/to/videos">
        <button class="btn sm" onclick="browse('input','folder')">Browse…</button>
      </div>
      <div class="form-row">
        <label class="fixed">Output file</label>
        <input type="text" id="output" class="path" placeholder="/path/to/output.mp4">
        <button class="btn sm" onclick="browse('output','savefile')">Browse…</button>
      </div>
      <div class="form-row">
        <label class="fixed" style="color:var(--subtle)">Music folder <span style="font-size:11px">(optional)</span></label>
        <input type="text" id="music" class="path" placeholder="/path/to/music">
        <button class="btn sm" onclick="browse('music','folder')">Browse…</button>
      </div>
    </div>
  </details>

  <!-- Settings -->
  <details>
    <summary>Settings</summary>
    <div class="section-body">
      <div class="form-row">
        <label class="fixed">Target duration</label>
        <input type="number" id="duration" class="short" value="60" min="1">
        <span class="unit">seconds</span>
      </div>
      <div class="form-row">
        <input type="checkbox" id="use_max" checked onchange="toggleEl('max_clip',this.checked)">
        <label for="use_max" style="width:140px">Max clip length</label>
        <input type="number" id="max_clip" class="short" value="10" min="1">
        <span class="unit">seconds</span>
      </div>
      <div class="form-row">
        <input type="checkbox" id="use_fade" checked onchange="toggleEl('fade_dur',this.checked)">
        <label for="use_fade" style="width:140px">Cross-fade duration</label>
        <input type="number" id="fade_dur" class="short" value="0.5" min="0.1" step="0.1">
        <span class="unit">seconds</span>
      </div>
      <div class="form-row">
        <input type="checkbox" id="use_seed" onchange="toggleEl('seed',this.checked)">
        <label for="use_seed" style="width:140px">Fixed random seed</label>
        <input type="number" id="seed" class="short" value="42" disabled>
      </div>
    </div>
  </details>

  <!-- Music -->
  <details>
    <summary>Music</summary>
    <div class="section-body">
      <div class="form-row">
        <label class="fixed">Music volume</label>
        <input type="number" id="music_vol" class="short" value="30" min="0" max="200">
        <span class="unit">%</span>
      </div>
      <div class="form-row">
        <input type="checkbox" id="beat_sync" checked>
        <label for="beat_sync">Beat-sync clip cuts</label>
      </div>
      <div class="form-row">
        <label class="fixed">Beats per clip</label>
        <input type="number" id="beats_per_clip" class="short" value="8" min="1">
        <span class="unit">beats</span>
      </div>
    </div>
  </details>

  <!-- Countdown Overlay -->
  <details>
    <summary>Countdown Overlay</summary>
    <div class="section-body">
      <div class="form-row">
        <input type="checkbox" id="use_countdown" onchange="toggleCountdown(this.checked)">
        <label for="use_countdown">Enable countdown overlay</label>
      </div>
      <div id="cd-fields" style="opacity:0.38;pointer-events:none">
        <div class="form-row" style="margin-top:6px">
          <label class="fixed">Corner</label>
          <select id="cd_corner">
            <option value="top-left">top-left</option>
            <option value="top-right" selected>top-right</option>
            <option value="bottom-left">bottom-left</option>
            <option value="bottom-right">bottom-right</option>
          </select>
          <label style="margin-left:14px;color:var(--subtle)">Countdown</label>
          <input type="number" id="cd_dur" class="short" value="5" min="1">
          <span class="unit">sec</span>
        </div>
        <div class="form-row">
          <label class="fixed">Every</label>
          <input type="number" id="cd_ivmin" class="short" value="50" min="1">
          <span class="unit">to</span>
          <input type="number" id="cd_ivmax" class="short" value="60" min="1">
          <span class="unit">sec</span>
        </div>
        <div class="form-row">
          <label class="fixed">Text after (empty=skip)</label>
          <input type="text" id="cd_text1" value="HOLD" style="width:90px">
          <span class="unit">for</span>
          <input type="number" id="cd_text1_dur" class="short" value="7" min="1">
          <span class="unit">sec</span>
        </div>
        <div class="form-row">
          <label class="fixed">Second text (empty=skip)</label>
          <input type="text" id="cd_text2" value="RELEASE" style="width:90px">
          <span class="unit">for</span>
          <input type="number" id="cd_text2_dur" class="short" value="4" min="1">
          <span class="unit">sec</span>
        </div>
        <div class="form-row">
          <input type="checkbox" id="cd_sync" checked>
          <label for="cd_sync">Sync to music change points</label>
        </div>
      </div>
    </div>
  </details>

  <!-- Action bar -->
  <div class="action-bar">
    <div class="btn-group">
      <button class="btn muted" id="btn-plan" onclick="startPlan()">Plan Video</button>
      <button class="btn primary" id="btn-generate" onclick="startGenerate()" disabled>Generate Video</button>
      <button class="btn" id="btn-cancel" onclick="cancelJob()" disabled>Cancel</button>
    </div>
    <div class="progress-area">
      <div class="progress-wrap">
        <progress id="progress" value="0" max="100"></progress>
        <span class="status-text" id="status-text">Ready</span>
      </div>
    </div>
  </div>

  <!-- Plan header -->
  <div class="plan-hdr">
    <h2>Plan</h2>
    <div class="btn-group">
      <button class="btn sm" onclick="loadPlan()">Load…</button>
      <button class="btn sm" id="btn-save" onclick="savePlan()" disabled>Save…</button>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-wrap" id="timeline-wrap">
    <div class="timeline-empty" id="tl-empty">No plan yet — click "Plan Video" to generate one.</div>
    <div class="timeline-clips" id="tl-clips" style="display:none"></div>
  </div>

  <!-- Clip editor -->
  <div class="clip-editor" id="clip-editor">
    <div class="clip-editor-title" id="ce-name"></div>
    <div class="clip-editor-fields">
      <div class="ce-field">
        <label>Start</label>
        <input type="number" id="ce-start" step="0.1" min="0" onchange="updateClip('start',+this.value)">
        <span class="unit">sec</span>
      </div>
      <div class="ce-field">
        <label>Duration</label>
        <input type="number" id="ce-dur" step="0.1" min="0.1" onchange="updateClip('duration',+this.value)">
        <span class="unit">sec</span>
      </div>
      <div class="ce-field">
        <span class="badge" id="ce-badge"></span>
      </div>
      <button class="btn sm danger" onclick="removeClip()">Remove</button>
    </div>
  </div>

  <!-- JSON toggle -->
  <div class="json-toggle-row">
    <button class="json-toggle" id="json-toggle" onclick="toggleJson()">▶ Show JSON</button>
  </div>
  <div class="json-editor-wrap" id="json-wrap">
    <textarea id="json-ta" placeholder="Plan JSON will appear here…" spellcheck="false"
              oninput="scheduleJsonSync()"></textarea>
  </div>

  <!-- Log -->
  <div class="log-section">
    <div class="log-hdr">
      <h2>Log</h2>
      <button class="btn sm" onclick="clearLog()">Clear</button>
    </div>
    <div class="log-output" id="log"></div>
  </div>

</div>
<script>
// ── State ──────────────────────────────────────────────────────────────────

let plan = null;
let selIdx = -1;
let es = null;           // EventSource
let jsonOpen = false;
let jsonTimer = null;

// ── Settings fields ────────────────────────────────────────────────────────

const FIELDS = [
  'input','output','music','duration',
  'use_max','max_clip','use_fade','fade_dur','use_seed','seed',
  'music_vol','beat_sync','beats_per_clip',
  'use_countdown','cd_corner','cd_dur','cd_ivmin','cd_ivmax',
  'cd_text1','cd_text1_dur','cd_text2','cd_text2_dur','cd_sync',
];

async function loadSettings() {
  try {
    const data = await (await fetch('/api/settings')).json();
    for (const id of FIELDS) {
      const el = document.getElementById(id);
      if (!el || !(id in data)) continue;
      if (el.type === 'checkbox') el.checked = Boolean(data[id]);
      else el.value = data[id];
    }
    toggleEl('max_clip',  document.getElementById('use_max').checked);
    toggleEl('fade_dur',  document.getElementById('use_fade').checked);
    toggleEl('seed',      document.getElementById('use_seed').checked);
    toggleCountdown(      document.getElementById('use_countdown').checked);
  } catch(e) { console.warn('settings load failed', e); }
}

function getSettings() {
  const s = {};
  for (const id of FIELDS) {
    const el = document.getElementById(id);
    if (!el) continue;
    s[id] = el.type === 'checkbox' ? el.checked : el.value;
  }
  return s;
}

async function saveSettings() {
  try {
    await fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(getSettings()),
    });
  } catch(e) {}
}

document.addEventListener('change', e => {
  if (e.target.matches('input, select')) saveSettings();
});

// ── Toggles ────────────────────────────────────────────────────────────────

function toggleEl(id, on) {
  const el = document.getElementById(id);
  if (el) el.disabled = !on;
}
function toggleCountdown(on) {
  const f = document.getElementById('cd-fields');
  f.style.opacity = on ? '1' : '0.38';
  f.style.pointerEvents = on ? 'auto' : 'none';
}

// ── Browse ─────────────────────────────────────────────────────────────────

async function browse(fieldId, type) {
  const ep = type === 'folder' ? '/api/browse/folder' : '/api/browse/savefile';
  try {
    const data = await (await fetch(ep, {method:'POST'})).json();
    if (data.path) {
      document.getElementById(fieldId).value = data.path;
      saveSettings();
    }
  } catch(e) { console.error(e); }
}

// ── Running state ──────────────────────────────────────────────────────────

function setRunning(on) {
  document.getElementById('btn-plan').disabled     = on;
  document.getElementById('btn-cancel').disabled   = !on;
  document.getElementById('btn-generate').disabled = on || !plan;
}

// ── SSE stream ─────────────────────────────────────────────────────────────

function openStream(jobId) {
  if (es) es.close();
  es = new EventSource(`/api/stream/${jobId}`);
  es.onmessage = e => handleEvent(JSON.parse(e.data));
  es.onerror = () => { es.close(); es = null; setRunning(false); };
}

function handleEvent(ev) {
  switch (ev.type) {
    case 'log':      appendLog(ev.msg, ev.color); break;
    case 'status':   document.getElementById('status-text').textContent = ev.msg; break;
    case 'progress': document.getElementById('progress').value = ev.value; break;
    case 'plan':
      setPlan(ev.plan);
      document.getElementById('btn-generate').disabled = false;
      document.getElementById('btn-save').disabled = false;
      break;
    case 'done':
      setRunning(false);
      if (es) { es.close(); es = null; }
      break;
    case 'error':
      appendLog('❌  ' + ev.msg, 'error');
      document.getElementById('status-text').textContent = 'Failed';
      setRunning(false);
      if (es) { es.close(); es = null; }
      break;
  }
}

// ── Plan / Generate / Cancel ───────────────────────────────────────────────

async function startPlan() {
  const s = getSettings();
  if (!s.input) { alert('Please set an input folder.'); return; }
  setRunning(true);
  document.getElementById('progress').value = 0;
  document.getElementById('status-text').textContent = 'Planning…';
  clearLog();
  try {
    const data = await post('/api/plan', s);
    if (data.error) { appendLog('❌  ' + data.error, 'error'); setRunning(false); return; }
    openStream(data.job_id);
  } catch(e) { appendLog('❌  ' + e.message, 'error'); setRunning(false); }
}

async function startGenerate() {
  if (!plan) return;
  setRunning(true);
  document.getElementById('progress').value = 0;
  document.getElementById('status-text').textContent = 'Generating…';
  clearLog();
  try {
    const data = await post('/api/generate', plan);
    if (data.error) { appendLog('❌  ' + data.error, 'error'); setRunning(false); return; }
    openStream(data.job_id);
  } catch(e) { appendLog('❌  ' + e.message, 'error'); setRunning(false); }
}

async function cancelJob() {
  await fetch('/api/cancel', {method:'POST'});
}

async function post(url, body) {
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  return r.json();
}

// ── Plan state ─────────────────────────────────────────────────────────────

function setPlan(p) {
  plan = p;
  selIdx = -1;
  renderTimeline();
  renderEditor();
  if (jsonOpen) syncToJson();
}

// ── Timeline ───────────────────────────────────────────────────────────────

function renderTimeline() {
  const empty  = document.getElementById('tl-empty');
  const clips  = document.getElementById('tl-clips');

  if (!plan || !plan.clips || plan.clips.length === 0) {
    empty.style.display  = 'flex';
    clips.style.display  = 'none';
    return;
  }
  empty.style.display = 'none';
  clips.style.display = 'flex';
  clips.innerHTML = '';

  const total = plan.clips.reduce((s, c) => s + c.duration, 0);
  const avail = document.getElementById('timeline-wrap').clientWidth - 24;
  const MIN_W = 56;

  plan.clips.forEach((clip, idx) => {
    const portrait = clip.height > clip.width;
    const w = Math.max(MIN_W, Math.round((clip.duration / total) * avail));
    const name = clip.path.split('/').pop();

    const el = document.createElement('div');
    el.className = `clip-block ${portrait ? 'portrait' : 'landscape'}${idx === selIdx ? ' selected' : ''}`;
    el.style.width = w + 'px';
    el.dataset.idx = idx;
    el.innerHTML = `<div class="clip-name">${escHtml(name)}</div><div class="clip-dur">${clip.duration.toFixed(1)}s</div>`;

    el.addEventListener('click', () => selectClip(idx));

    // Drag to reorder
    el.draggable = true;
    el.addEventListener('dragstart', e => {
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx));
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const src = parseInt(e.dataTransfer.getData('text/plain'));
      const dst = parseInt(el.dataset.idx);
      if (src !== dst) {
        const arr = [...plan.clips];
        const [moved] = arr.splice(src, 1);
        arr.splice(dst, 0, moved);
        plan.clips = arr;
        selIdx = dst;
        renderTimeline();
        renderEditor();
        if (jsonOpen) syncToJson();
      }
    });

    clips.appendChild(el);
  });
}

function selectClip(idx) {
  selIdx = idx;
  renderTimeline();
  renderEditor();
}

// ── Clip editor ────────────────────────────────────────────────────────────

function renderEditor() {
  const ed = document.getElementById('clip-editor');
  if (selIdx < 0 || !plan || selIdx >= plan.clips.length) {
    ed.classList.remove('open');
    return;
  }
  const c = plan.clips[selIdx];
  const portrait = c.height > c.width;
  document.getElementById('ce-name').textContent = c.path.split('/').pop();
  document.getElementById('ce-start').value = c.start;
  document.getElementById('ce-dur').value   = c.duration;
  const badge = document.getElementById('ce-badge');
  badge.textContent = portrait ? 'portrait' : 'landscape';
  badge.className = `badge ${portrait ? 'portrait' : 'landscape'}`;
  ed.classList.add('open');
}

function updateClip(field, val) {
  if (selIdx < 0 || !plan) return;
  plan.clips[selIdx][field] = val;
  renderTimeline();
  if (jsonOpen) syncToJson();
}

function removeClip() {
  if (selIdx < 0 || !plan) return;
  plan.clips.splice(selIdx, 1);
  selIdx = plan.clips.length === 0 ? -1 : Math.min(selIdx, plan.clips.length - 1);
  renderTimeline();
  renderEditor();
  if (jsonOpen) syncToJson();
}

// ── JSON editor ────────────────────────────────────────────────────────────

function toggleJson() {
  jsonOpen = !jsonOpen;
  document.getElementById('json-wrap').classList.toggle('open', jsonOpen);
  const btn = document.getElementById('json-toggle');
  btn.textContent = (jsonOpen ? '▼ Hide' : '▶ Show') + ' JSON';
  if (jsonOpen && plan) syncToJson();
}

function syncToJson() {
  if (!plan) return;
  const ta = document.getElementById('json-ta');
  const pos = ta.selectionStart;
  ta.value = JSON.stringify(plan, null, 2);
  try { ta.setSelectionRange(pos, pos); } catch(_) {}
}

function scheduleJsonSync() {
  clearTimeout(jsonTimer);
  jsonTimer = setTimeout(() => {
    try {
      const parsed = JSON.parse(document.getElementById('json-ta').value);
      plan = parsed;
      renderTimeline();
      renderEditor();
    } catch(_) {}
  }, 400);
}

// ── Load / Save plan ───────────────────────────────────────────────────────

function loadPlan() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = async () => {
    const file = inp.files[0];
    if (!file) return;
    try {
      const p = JSON.parse(await file.text());
      setPlan(p);
      document.getElementById('btn-generate').disabled = false;
      document.getElementById('btn-save').disabled = false;
      appendLog(`✓  Loaded: ${file.name}`, 'success');
    } catch(e) { alert('Could not parse JSON: ' + e.message); }
  };
  inp.click();
}

function savePlan() {
  if (!plan) return;
  const blob = new Blob([JSON.stringify(plan, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'video_plan.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Log ────────────────────────────────────────────────────────────────────

function appendLog(msg, color) {
  const log = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line' + (color ? ' ' + color : '');
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function clearLog() { document.getElementById('log').innerHTML = ''; }

// ── Util ───────────────────────────────────────────────────────────────────

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ───────────────────────────────────────────────────────────────────

loadSettings();
</script>
</body>
</html>
